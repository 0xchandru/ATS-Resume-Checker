kind = "web"
previewPath = "/"
title = "OpenResume"
version = "1.0.0"
id = "artifacts/open-resume"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18897

[services.development]
run = "pnpm --filter @workspace/open-resume run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/open-resume", "run", "build" ]
publicDir = "artifacts/open-resume/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18897"
BASE_PATH = "/"
