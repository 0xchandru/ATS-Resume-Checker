kind = "mobile"
previewPath = "/mobile/"
title = "ATS Checker Mobile"
version = "1.0.0"
id = "artifacts/open-resume-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 25874

[services.development]
run = "pnpm --filter @workspace/open-resume-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/open-resume-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/open-resume-mobile", "run", "serve" ]

[services.env]
PORT = "25874"
BASE_PATH = "/mobile/"
